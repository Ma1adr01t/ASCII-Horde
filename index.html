<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASCII Horde</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <h1>ASCII Horde</h1>

      <section class="hud" aria-live="polite">
        <span>HP: <strong id="hp">10</strong>/<strong id="max-hp">10</strong></span>
        <span>Shots: <strong id="shots">3/3</strong></span>
        <span>Turn: <strong id="turn">0</strong></span>
        <span>Kills: <strong id="kills">0</strong></span>
        <span>Enemies: <strong id="enemy-count">0</strong></span>
      </section>

      <section class="grid-wrap" aria-label="ASCII dungeon">
        <pre id="grid" class="grid" role="img" aria-label="40 by 30 ASCII grid"></pre>
        <div id="chest-overlay" class="chest-overlay hidden" aria-live="assertive">
          <div class="chest-modal">
            <p id="chest-text"></p>
            <div class="chest-actions">
              <button id="take-btn" class="btn" type="button">Take</button>
              <button id="leave-btn" class="btn" type="button">Leave</button>
            </div>
          </div>
        </div>
      </section>

      <section id="message-log" class="message-log" aria-live="polite"></section>

      <section id="inventory" class="inventory" aria-live="polite"></section>

      <section class="controls" aria-label="Controls">
        <div class="dpad" role="group" aria-label="Directional pad">
          <button data-dir="up" class="btn dir up" type="button">Up</button>
          <button data-dir="left" class="btn dir left" type="button">Left</button>
          <button data-dir="right" class="btn dir right" type="button">Right</button>
          <button data-dir="down" class="btn dir down" type="button">Down</button>
        </div>
        <div class="actions">
          <button id="wait-btn" class="btn" type="button">Wait</button>
          <button id="reload-btn" class="btn" type="button">Reload</button>
          <button id="restart-btn" class="btn" type="button">Restart</button>
        </div>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>
